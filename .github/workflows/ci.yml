name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                compiler:
                    - gfortran
                    - lfortran
                    - flang

        steps:
            - uses: actions/checkout@v7

            - name: Setup Fortran
              uses: minhqdao/setup-fortran@v1
              with:
                  compiler: ${{ matrix.compiler }}

            - name: Build (gfortran)
              if: matrix.compiler == 'gfortran'
              run: gfortran src/oregon.f src/oregon_time.f -o oregon

            - name: Build (lfortran)
              if: matrix.compiler == 'lfortran'
              run: lfortran --fixed-form --implicit-interface --implicit-typing src/oregon.f src/oregon_time.f -o oregon

            - name: Build (flang)
              if: matrix.compiler == 'flang'
              run: flang src/oregon.f src/oregon_time.f -o oregon

            - name: Smoke test
              run: |
                  printf "N\n" | timeout 5 ./oregon | tee output.txt
                  grep -q "DO YOU NEED INSTRUCTIONS" output.txt

    build-wasm:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Setup LFortran
              uses: minhqdao/setup-fortran@v1
              with:
                  compiler: lfortran

            - name: Setup Emscripten
              uses: emscripten-core/setup-emsdk@v16

            - name: Build WebAssembly
              env:
                  EMSDK_PATH: ${{ env.EMSDK }}
              run: |
                  lfortran \
                    --fixed-form \
                    --implicit-interface \
                    --implicit-typing \
                    --target=wasm32-unknown-emscripten \
                    src/oregon.f \
                    src/oregon_time.f \
                    -o oregon.js

            - name: WASM smoke test
              run: |
                  timeout 5 node oregon.js | tee output.txt || true
                  grep -q "DO YOU NEED INSTRUCTIONS" output.txt

            - name: Check LLVM tools
              run: |
                  which llvm-link || true
                  which llc || true
                  which wasm-ld || true
                  llvm-link --version || true
                  llc --version || true
                  wasm-ld --version || true
